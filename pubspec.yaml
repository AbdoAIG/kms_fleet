name: kms_fleet
description: نظام إدارة صيانة أسطول المركبات - KMS Fleet Management System
publish_to: 'none'
version: 3.2.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # Firebase (Auth only - data stored locally with Hive)
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  connectivity_plus: ^6.1.3

  # 3D Viewer
  model_viewer_plus: ^1.0.1

  # UI & Charts
  fl_chart: ^0.68.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  uuid: ^4.4.0

  # Export
  pdf: ^3.11.1
  excel: ^4.0.6
  share_plus: ^10.1.4
  open_filex: ^4.5.0
  permission_handler: ^11.3.1

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
