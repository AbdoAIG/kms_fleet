name: kms_fleet
description: نظام إدارة صيانة أسطول المركبات - KMS Fleet Management System
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  fl_chart: ^0.68.0
  intl: ^0.20.2
  uuid: ^4.4.0

  # Supabase (replaces Firebase — works on ALL platforms)
  supabase_flutter: ^2.8.4
  sqflite_common_ffi: ^2.3.4

  # GPS & Maps
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Reports
  pdf: ^3.11.1
  excel: ^4.0.6
  share_plus: ^10.1.4

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
